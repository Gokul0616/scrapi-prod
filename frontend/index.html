<!doctype html>
<html>
<head><meta charset="utf-8"><title>Scrapi Dashboard</title></head>
<body>
  <h1>Scrapi Dashboard</h1>
  <button id="load">Load Actors</button>
  <pre id="out"></pre>
  <script>
    document.getElementById('load').onclick = async () => {
      const res = await fetch('http://localhost:8000/v1/actors');
      document.getElementById('out').textContent = JSON.stringify(await res.json(), null, 2);
    };
  </script>
</body>
</html>
